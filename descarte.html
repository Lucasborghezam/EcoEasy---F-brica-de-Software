<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Denúncia de Descarte Indevido</title>
  <link rel="stylesheet" href="descarte.css">
</head>
<body>

  <main class="container">
    <section class="menu-box">
      <h1>Denúncia de Descarte Indevido</h1>
      <p>Preencha os dados para registrar sua denúncia</p>

      <form id="formDenuncia">
        <div class="form-group">
          <label for="descricao">Descrição da denúncia</label>
          <textarea
            id="descricao"
            rows="5"
            placeholder="Descreva o descarte indevido observado..."
            required
          ></textarea>
        </div>

        <div class="form-group">
          <label for="foto">Anexar foto</label>
          <input
            type="file"
            id="foto"
            accept="image/*"
            required
          >
        </div>

        <button type="submit" class="confirm-button">
          Confirmar denúncia
        </button>
      </form>

      <div class="protocolo-box" id="protocoloBox">
        <h3>Denúncia registrada com sucesso</h3>
        <p>Sua denúncia foi enviada para análise.</p>
        <p id="protocolo"></p>
      </div>

      <a href="menu.html" class="menu-button">Voltar ao menu</a>
    </section>
  </main>

  <script>
    const form = document.getElementById("formDenuncia");
    const protocoloBox = document.getElementById("protocoloBox");
    const protocoloTexto = document.getElementById("protocolo");

    form.addEventListener("submit", function(event) {
      event.preventDefault();

      const descricao = document.getElementById("descricao").value.trim();
      const foto = document.getElementById("foto").files.length;

      if (descricao === "" || foto === 0) {
        alert("Preencha a descrição e anexe uma foto da denúncia.");
        return;
      }

      const numero = Math.floor(Math.random() * 900000) + 100000;

      protocoloTexto.innerHTML = "Protocolo da denúncia: <b>#DN" + numero + "</b>";
      protocoloBox.style.display = "block";

      form.reset();
    });
  </script>

</body>
</html>
